server {
    listen 80;
    listen [::]:80;
    server_name _;

    index index.php index.html;
    root /var/www/html/dist;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Forbidden files or directories
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md|node_modules|src|admin/vendor|composer\.json|composer\.lock|package\.json|package-lock\.json|vite\.config\.js|tailwind\.config\.js|postcss\.config\.js) {
        return 404;
    }

    # Let's Encrypt / ACME challenge (Coolify/Traefik)
    location ~ \.well-known {
        allow all;
    }

    # Proteger arquivos sensíveis do admin
    location ~ ^/admin/(config|database|scripts|vendor|composer\.(json|lock)|\.env|\.git) {
        return 404;
    }

    # ============================================
    # API PÚBLICA (/admin/api)
    # ============================================
    location /admin/api {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/admin/public/index.php;
        fastcgi_param SCRIPT_NAME /admin/public/index.php;
        fastcgi_read_timeout 300;
        fastcgi_hide_header X-Powered-By;
    }

    # ============================================
    # ÁREA ADMINISTRATIVA (/admin)
    # ============================================
    location /admin {
        root /var/www/html;
        try_files $uri @admin;
    }

    # Evita download do PHP como arquivo estático (ex.: /admin/index.php)
    location ~ ^/admin/.+\.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/admin/public/index.php;
        fastcgi_param SCRIPT_NAME /admin/public/index.php;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;
    }

    location @admin {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/admin/public/index.php;
        fastcgi_param SCRIPT_NAME /admin/public/index.php;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;
    }

    # ============================================
    # IMAGENS DOS PRODUTOS (volume persistente)
    # ============================================
    location /images/produtos/ {
        alias /var/www/html/public/images/produtos/;

        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ============================================
    # ASSETS ESTÁTICOS (JS, CSS do front-end)
    # ============================================
    location ~* \.(js|css|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        gzip_static on;
    }

    # ============================================
    # IMAGENS ESTÁTICAS
    # ============================================
    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|webp|avif|svg)$ {
        expires 30d;
        access_log off;
    }

    # ============================================
    # FONTES
    # ============================================
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # ============================================
    # AVALIAÇÃO GOOGLE (/avaliar → Slim)
    # ============================================
    location ~ ^/avaliar/?$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/admin/public/index.php;
        fastcgi_param SCRIPT_NAME /admin/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_hide_header X-Powered-By;
    }

    # ============================================
    # FRONT-END VUE.JS (SPA Routing)
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;

        expires 1h;
        add_header Cache-Control "public, must-revalidate";

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json application/xml;
        gzip_comp_level 6;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        access_log off;
        log_not_found off;
    }

    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    autoindex off;
}
