server
{
    listen 80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen [::]:80;
    server_name pequenosabordo.com.br www.pequenosabordo.com.br;
    index index.php index.html index.htm default.php default.htm default.html;
    
    # Root aponta para dist/ (front-end Vue.js)
    root /www/wwwroot/pequenosabordo.com.br/dist;
    
    include /www/server/panel/vhost/nginx/extension/pequenosabordo.com.br/*.conf;

    #CERT-APPLY-CHECK--START
    # Configuration related to file verification for SSL certificate application - Do not delete
    include /www/server/panel/vhost/nginx/well-known/pequenosabordo.com.br.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL related configuration, do NOT delete or modify the next line of commented-out 404 rules
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/pequenosabordo.com.br/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/pequenosabordo.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    error_page 497  https://$host$request_uri;
    #SSL-END

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    #ERROR-PAGE-START  Error page configuration, allowed to be commented, deleted or modified
    error_page 404 /404.html;
    error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  PHP reference configuration, allowed to be commented, deleted or modified
    include enable-php-83.conf;
    #PHP-INFO-END

    #REWRITE-START URL rewrite rule reference, any modification will invalidate the rewrite rules set by the panel
    include /www/server/panel/vhost/rewrite/pequenosabordo.com.br.conf;
    #REWRITE-END

    # Forbidden files or directories
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md|node_modules|src|admin/vendor|composer\.json|composer\.lock|package\.json|package-lock\.json|vite\.config\.js|tailwind\.config\.js|postcss\.config\.js)
    {
        return 404;
    }

    # Directory verification related settings for one-click application for SSL certificate
    location ~ \.well-known{
        allow all;
    }

    # Prohibit putting sensitive files in certificate verification directory
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # ============================================
    # ÁREA ADMINISTRATIVA (/admin)
    # ============================================
    
    location /admin {
        # Root para o diretório admin
        root /www/wwwroot/pequenosabordo.com.br;
        
        # Tenta servir arquivo estático, se não encontrar, passa para index.php
        try_files $uri $uri/ /admin/public/index.php?$query_string;
        
        # Não expor versão do PHP
        fastcgi_hide_header X-Powered-By;
        
        # Configurações PHP
        location ~ \.php$ {
            fastcgi_pass unix:/tmp/php-cgi-83.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            # Timeout para uploads grandes
            fastcgi_read_timeout 300;
            fastcgi_send_timeout 300;
            
            # Security
            fastcgi_param HTTP_PROXY "";
        }
        
        # Proteger arquivos sensíveis do admin
        location ~ ^/admin/(config|database|scripts|vendor|composer\.(json|lock)|\.env|\.git) {
            return 404;
        }
    }

    # ============================================
    # API PÚBLICA (/admin/api)
    # ============================================
    
    location /admin/api {
        root /www/wwwroot/pequenosabordo.com.br;
        try_files $uri /admin/public/index.php?$query_string;
        
        # CORS para API
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        location ~ \.php$ {
            fastcgi_pass unix:/tmp/php-cgi-83.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # ============================================
    # IMAGENS DOS PRODUTOS
    # ============================================
    
    location /images/produtos/ {
        alias /www/wwwroot/pequenosabordo.com.br/public/images/produtos/;
        
        # Cache agressivo para imagens
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Otimização de imagens
        access_log off;
        
        # Validar tipos de imagem
        location ~ \.(jpg|jpeg|png|gif|webp|svg)$ {
            valid_referers none blocked server_names *.pequenosabordo.com.br;
            if ($invalid_referer) {
                return 403;
            }
        }
    }

    # ============================================
    # ASSETS ESTÁTICOS (JS, CSS do front-end)
    # ============================================
    
    location ~* \.(js|css|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        
        # Compressão gzip
        gzip_static on;
    }

    # ============================================
    # IMAGENS ESTÁTICAS (GIF, JPG, PNG, etc)
    # ============================================
    
    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    # ============================================
    # FONTES
    # ============================================
    
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # ============================================
    # FRONT-END VUE.JS (SPA Routing)
    # ============================================
    
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache para HTML (curto)
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        
        # Compressão
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json application/xml;
        gzip_comp_level 6;
        
        # GZIP adicional para conteúdo dinâmico
    }

    # ============================================
    # LOGS
    # ============================================
    
    access_log  /www/wwwlogs/pequenosabordo.com.br.log;
    error_log   /www/wwwlogs/pequenosabordo.com.br.error.log;

    # ============================================
    # OTIMIZAÇÕES GERAIS
    # ============================================
    
    # Desabilitar logs para recursos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        access_log off;
        log_not_found off;
    }
    
    # Limitar tamanho de upload
    client_max_body_size 10M;
    
    # Timeout
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Desabilitar acesso a diretórios
    autoindex off;
}
